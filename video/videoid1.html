<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a2e;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
            max-width: 1000px;
            width: 100%;
            overflow: hidden;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .custom-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 4px 4px 4px;
            flex-wrap: wrap;
            background: transparent;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #fff;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.2s ease;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            min-width: 80px;
            transition: height 0.2s;
        }

        .progress-bar:hover {
            height: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 3px;
            width: 0%;
            transition: width 0.05s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: -3px;
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .time-display {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            min-width: 105px;
            text-align: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 70px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            transition: width 0.2s;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .video-title {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            padding: 8px 4px 4px 4px;
            letter-spacing: -0.3px;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 4px 12px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 16px;
        }

        .video-stats {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            display: flex;
            gap: 16px;
        }

        .video-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .source-badge {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(102, 126, 234, 0.15);
        }

        @media (max-width: 700px) {
            .container {
                padding: 12px;
                border-radius: 16px;
            }
            .custom-controls {
                gap: 10px;
                padding: 12px 2px 2px 2px;
            }
            .time-display {
                font-size: 12px;
                min-width: 75px;
            }
            .volume-slider {
                width: 40px;
            }
            .control-btn {
                width: 36px;
                height: 36px;
                font-size: 15px;
                padding: 6px;
            }
            .video-title {
                font-size: 16px;
            }
            .video-stats {
                font-size: 11px;
                gap: 10px;
            }
            .video-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                padding-bottom: 10px;
                margin-bottom: 12px;
            }
        }

        @media (max-width: 400px) {
            .volume-slider {
                width: 30px;
            }
            .time-display {
                min-width: 60px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-meta">
            <div>
                <div class="video-title">🎬 Cloudflare Video</div>
                <div class="video-stats">
                    <span>📁 R2 Storage</span>
                    <span>⚡ 1080p</span>
                    <span>🌐 CDN</span>
                </div>
            </div>
            <div class="source-badge">Cloudflare R2</div>
        </div>

        <div class="video-wrapper">
            <video id="videoPlayer" preload="metadata" playsinline>
                <source src="https://pub-8c18001f5bc64883b4a7b7385238da0a.r2.dev/Mallu%20girl%20porn%20video%20-%20American%20gore%20ko%20funny%20blowjob%20diya.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <div class="custom-controls">
            <button class="control-btn" id="playPauseBtn">▶</button>
            <button class="control-btn" id="muteBtn">🔊</button>

            <div class="volume-control">
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="time-display" id="timeDisplay">0:00 / 0:00</div>

            <button class="control-btn" id="fullscreenBtn">⛶</button>
        </div>

        <div style="padding: 10px 4px 0 4px; color: rgba(255,255,255,0.3); font-size: 11px; text-align: center; border-top: 1px solid rgba(255,255,255,0.04); margin-top: 12px;">
            Powered by Cloudflare R2 • Stream ready
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function updateProgress() {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFill.style.width = percent + '%';
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        }

        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                playPauseBtn.textContent = '⏸';
            } else {
                video.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        video.addEventListener('play', () => {
            playPauseBtn.textContent = '⏸';
        });

        video.addEventListener('pause', () => {
            playPauseBtn.textContent = '▶';
        });

        video.addEventListener('timeupdate', updateProgress);

        video.addEventListener('loadedmetadata', () => {
            timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
        });

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        volumeSlider.addEventListener('input', (e) => {
            video.volume = parseFloat(e.target.value);
            video.muted = video.volume === 0;
            muteBtn.textContent = video.muted ? '🔇' : '🔊';
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.querySelector('.container').requestFullscreen().catch(err => {
                    // Fallback for older browsers
                    document.querySelector('.video-wrapper').requestFullscreen().catch(() => {});
                });
            } else {
                document.exitFullscreen();
            }
        });

        video.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶';
            progressFill.style.width = '0%';
            timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                playPauseBtn.click();
            }
            if (e.key === 'f' || e.key === 'F') {
                fullscreenBtn.click();
            }
            if (e.key === 'm' || e.key === 'M') {
                muteBtn.click();
            }
            if (e.key === 'ArrowRight' && video.duration) {
                video.currentTime = Math.min(video.currentTime + 5, video.duration);
            }
            if (e.key === 'ArrowLeft' && video.duration) {
                video.currentTime = Math.max(video.currentTime - 5, 0);
            }
        });

        // Handle volume changes from system
        video.addEventListener('volumechange', () => {
            if (video.muted) {
                muteBtn.textContent = '🔇';
                volumeSlider.value = 0;
            } else {
                muteBtn.textContent = '🔊';
                volumeSlider.value = video.volume;
            }
        });

        console.log('🎬 Video player ready — Cloudflare R2 stream');
    </script>
</body>
</html>
