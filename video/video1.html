      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
      display: block;
      filter: none !important;
      opacity: 1 !important;
    }

    .video-container video::-webkit-media-controls {
      background: transparent !important;
      opacity: 0.3 !important;
      transition: opacity 0.3s !important;
    }

    .video-container video::-webkit-media-controls:hover {
      opacity: 1 !important;
    }

    .video-container video::-webkit-media-controls-panel {
      background: transparent !important;
      background-image: none !important;
    }

    .video-container video::-webkit-media-controls-overlay-enclosure {
      background: transparent !important;
    }

    .video-container video::-webkit-media-controls-overlay-play-button {
      background: transparent !important;
    }

    .video-container video::-moz-media-controls {
      background: transparent !important;
    }

    .video-container:hover video::-webkit-media-controls {
      opacity: 1 !important;
    }
