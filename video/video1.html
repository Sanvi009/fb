<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Video</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
    }

    /* Nav bar */
    .nav-bar {
      width: 100%;
      padding: 1rem 0.5rem 0.75rem;
      background: transparent;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .nav-bar a {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      background: #1a1a1a;
      padding: 0.2rem 1.2rem 0.3rem;
      border-radius: 40px;
      border: 1px solid #2a2a2a;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .nav-bar a:hover {
      background: #252525;
      border-color: #4a4a4a;
    }

    /* Video container - YouTube style 16:9 */
    .video-wrapper {
      width: 100%;
      max-width: 1280px;
      margin: 1.5rem auto 0;
      padding: 0 1rem;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #222;
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain; /* This ensures letterboxing for 9:16 videos */
      display: block;
    }

    /* Custom video controls - minimal YouTube style */
    .video-container video::-webkit-media-controls {
      background: rgba(0, 0, 0, 0.6);
    }

    .video-container video::-webkit-media-controls-panel {
      background: rgba(0, 0, 0, 0.6);
    }

    /* Empty space below */
    .empty-space {
      flex: 1;
      min-height: 200px;
    }

    @media (max-width: 600px) {
      .nav-bar a {
        font-size: 1.4rem;
        padding: 0.15rem 1rem;
      }
      .video-wrapper {
        padding: 0 0.5rem;
      }
      .video-container {
        border-radius: 8px;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #2f2f2f;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <!-- Nav bar with Home link -->
  <nav class="nav-bar">
    <a href="/">Home</a>
  </nav>

  <!-- Video player -->
  <div class="video-wrapper">
    <div class="video-container">
      <video 
        src="https://pub-8c18001f5bc64883b4a7b7385238da0a.r2.dev/2705852731957013864.480p.mp4" 
        controls
        playsinline
        preload="metadata"
        poster=""
      ></video>
    </div>
  </div>

  <!-- Empty space below -->
  <div class="empty-space"></div>

</body>
</html>
