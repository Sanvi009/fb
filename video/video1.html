<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eee;
    }

    .nav-bar {
      width: 100%;
      padding: 1rem 0.5rem 0.75rem;
      background: transparent;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .nav-bar a {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      background: #1a1a1a;
      padding: 0.2rem 1.2rem 0.3rem;
      border-radius: 40px;
      border: 1px solid #2a2a2a;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .nav-bar a:hover {
      background: #252525;
      border-color: #4a4a4a;
    }

    @media (max-width: 600px) {
      .nav-bar a {
        font-size: 1.4rem;
        padding: 0.15rem 1rem;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #2f2f2f;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="/">Home</a>
  </nav>

  <!-- No cards, no content – just black empty space -->

</body>
</html>
