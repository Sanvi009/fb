<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>shuffle · cards</title>
  <style>
    /* reset & base – full black */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eee;
      padding: 0 1rem 1.5rem;
    }

    /* nav bar – minimal, black, only text */
    .nav-bar {
      width: 100%;
      padding: 1rem 0.5rem 0.75rem;
      background: transparent;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 1.5rem;
    }

    .nav-bar span {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      background: #1a1a1a;
      padding: 0.2rem 1.2rem 0.3rem;
      border-radius: 40px;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.02);
      text-transform: lowercase;
      backdrop-filter: blur(2px);
      border: 1px solid #2a2a2a;
    }

    /* main grid — responsive, cards 5:4 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.2rem 0 1rem;
    }

    /* card – 5:4 ratio, dark surface, NO emoji, just image */
    .card {
      background: #131313;
      border-radius: 20px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.7), 0 0 0 1px #2f2f2f inset;
      aspect-ratio: 5 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, box-shadow 0.2s;
      padding: 0.5rem;
      min-height: 0;
      width: 100%;
      border: none;
      position: relative;
      backdrop-filter: blur(2px);
      overflow: hidden;
    }

    /* image inside – fills the card, smooth */
    .card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      background: #0f0f0f;
      transition: opacity 0.3s ease;
      box-shadow: 0 0 0 1px #2b2b2b inset;
    }

    /* ----- SKELETON LOADING ----- */
    .skeleton {
      background: #1a1a1a;
      border-radius: 20px;
      aspect-ratio: 5 / 4;
      width: 100%;
      box-shadow: 0 0 0 1px #2a2a2a inset;
      position: relative;
      overflow: hidden;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skeleton::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 300%;
      height: 100%;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(60, 60, 60, 0.15) 30%, 
        rgba(80, 80, 80, 0.2) 50%, 
        rgba(60, 60, 60, 0.15) 70%, 
        transparent 100%);
      animation: skeleton-shimmer 1.8s infinite;
      border-radius: 20px;
    }

    @keyframes skeleton-shimmer {
      0% { transform: translateX(-30%); }
      100% { transform: translateX(30%); }
    }

    .skeleton-inner {
      width: 100%;
      height: 100%;
      background: #181818;
      border-radius: 16px;
      box-shadow: inset 0 0 0 1px #252525;
    }

    /* hide skeleton when image loads */
    .card img.loaded + .skeleton-placeholder {
      display: none;
    }

    .skeleton-placeholder {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      right: 0.5rem;
      bottom: 0.5rem;
      border-radius: 16px;
      background: #181818;
      box-shadow: inset 0 0 0 1px #252525;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s;
    }

    /* when image is loaded, hide skeleton placeholder */
    .card img.loaded ~ .skeleton-placeholder {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    /* fallback if image fails: show dark card with no emoji */
    .card img[style*="display: none"] ~ .skeleton-placeholder {
      opacity: 1;
      background: #181818;
    }

    /* hide skeleton completely after load (we use loaded class) */
    .card img.loaded + .skeleton-placeholder {
      display: none;
    }

    /* ----- MOBILE: EXACTLY 2 CARDS PER ROW ----- */
    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 0.9rem;
      }
      .nav-bar span {
        font-size: 1.4rem;
        padding: 0.15rem 1rem;
      }
      .card {
        border-radius: 16px;
      }
      .skeleton {
        border-radius: 16px;
      }
      .skeleton::before {
        border-radius: 16px;
      }
    }

    @media (min-width: 1000px) {
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 1.6rem;
      }
    }

    /* accessibility & touch */
    .card:active {
      transform: scale(0.98);
    }

    /* scrollbar – dark */
    ::-webkit-scrollbar {
      width: 8px;
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #2f2f2f;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <!-- nav bar: only text "videos" (or nothing) -->
  <nav class="nav-bar">
    <span>videos</span>
  </nav>

  <!-- card grid injected by javascript -->
  <div class="card-grid" id="cardGrid"></div>

  <script>
    (function() {
      "use strict";

      // ----- configuration -----
      const JSON_PATH = 'list.json';          // root relative
      const IMAGE_FOLDER = 'images/';         // root/images/
      // NO emojis – entirely removed

      // ----- shuffle function (Fisher–Yates) -----
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // ----- load JSON and render shuffled cards with skeleton loading -----
      async function loadAndRender() {
        const grid = document.getElementById('cardGrid');
        if (!grid) return;

        // 1. show skeleton placeholders immediately (based on number of items in JSON)
        // we don't know the count yet, so we'll fetch first, then show skeletons.
        // but we want skeleton to appear before images load.
        // we'll fetch JSON, then render skeletons, then load images.
        try {
          const response = await fetch(JSON_PATH);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status} – ${response.statusText}`);
          }
          const data = await response.json();
          const entries = Object.values(data);
          if (!entries || entries.length === 0) {
            grid.innerHTML = `<p style="color: #666; padding: 2rem;">no images found</p>`;
            return;
          }

          // shuffle the list of filenames (full shuffle)
          const shuffledFiles = shuffleArray([...entries]);

          // 2. build skeleton grid (same number of cards)
          let skeletonHtml = '';
          for (let i = 0; i < shuffledFiles.length; i++) {
            skeletonHtml += `
              <div class="skeleton">
                <div class="skeleton-inner"></div>
              </div>
            `;
          }
          grid.innerHTML = skeletonHtml;

          // 3. now build real cards with images, but we'll replace each skeleton one by one
          // we'll use a document fragment to build cards, then replace children
          const fragment = document.createDocumentFragment();
          for (let i = 0; i < shuffledFiles.length; i++) {
            const filename = shuffledFiles[i];
            const cleanName = filename.trim();
            const imagePath = IMAGE_FOLDER + cleanName;

            const card = document.createElement('div');
            card.className = 'card';

            const img = document.createElement('img');
            img.src = imagePath;
            img.alt = cleanName;
            img.loading = 'lazy';
            // onerror: hide image, keep skeleton placeholder visible
            img.onerror = function() {
              this.style.display = 'none';
              // skeleton placeholder is already there as sibling, but we need to keep it visible
              // we have .skeleton-placeholder as sibling, but we used a different structure.
              // we'll restructure: we'll add a .skeleton-placeholder as sibling to img
              // so we need to adjust card structure.
            };

            // we need to restructure: we'll create card with img + skeleton-placeholder
            // but we already built skeleton cards with .skeleton class.
            // easier: recreate each card with image + skeleton placeholder.
            // we'll replace the skeleton divs with real cards.
          }

          // Since we already inserted skeleton divs, we need to replace them with real cards.
          // We'll use a different approach: clear grid, build real cards with skeleton placeholders inside.
          // But we want smooth transition: show skeleton, then images load and skeleton fades.
          // Let's rebuild from scratch with proper structure.

          // Re-fetch? No, we already have data. Let's clear grid and build with real cards + skeleton placeholders.
          // This time we include skeleton placeholder inside each card.
          grid.innerHTML = '';

          for (let i = 0; i < shuffledFiles.length; i++) {
            const filename = shuffledFiles[i];
            const cleanName = filename.trim();
            const imagePath = IMAGE_FOLDER + cleanName;

            const card = document.createElement('div');
            card.className = 'card';

            const img = document.createElement('img');
            img.src = imagePath;
            img.alt = cleanName;
            img.loading = 'lazy';
            img.style.opacity = '0'; // start hidden

            // skeleton placeholder (inner)
            const skeletonDiv = document.createElement('div');
            skeletonDiv.className = 'skeleton-placeholder';
            // we'll style it as a shimmering block
            skeletonDiv.style.position = 'absolute';
            skeletonDiv.style.top = '0.5rem';
            skeletonDiv.style.left = '0.5rem';
            skeletonDiv.style.right = '0.5rem';
            skeletonDiv.style.bottom = '0.5rem';
            skeletonDiv.style.borderRadius = '16px';
            skeletonDiv.style.background = '#181818';
            skeletonDiv.style.boxShadow = 'inset 0 0 0 1px #252525';
            skeletonDiv.style.pointerEvents = 'none';
            skeletonDiv.style.zIndex = '1';
            skeletonDiv.style.transition = 'opacity 0.4s';
            // add shimmer effect via pseudo element? we can use a separate div.
            // better: add a shimmer overlay inside skeleton placeholder
            const shimmer = document.createElement('div');
            shimmer.style.position = 'absolute';
            shimmer.style.top = '0';
            shimmer.style.left = '-100%';
            shimmer.style.width = '300%';
            shimmer.style.height = '100%';
            shimmer.style.background = 'linear-gradient(90deg, transparent 0%, rgba(60,60,60,0.15) 30%, rgba(80,80,80,0.2) 50%, rgba(60,60,60,0.15) 70%, transparent 100%)';
            shimmer.style.animation = 'skeleton-shimmer 1.8s infinite';
            shimmer.style.borderRadius = '16px';
            skeletonDiv.appendChild(shimmer);

            // when image loads: hide skeleton, show image
            img.onload = function() {
              this.style.opacity = '1';
              this.classList.add('loaded');
              // fade out skeleton
              const skel = this.nextElementSibling;
              if (skel && skel.classList.contains('skeleton-placeholder')) {
                skel.style.opacity = '0';
                setTimeout(() => {
                  skel.style.display = 'none';
                }, 400);
              }
            };

            // if image fails: keep skeleton visible, hide image
            img.onerror = function() {
              this.style.display = 'none';
              const skel = this.nextElementSibling;
              if (skel && skel.classList.contains('skeleton-placeholder')) {
                skel.style.opacity = '1';
                skel.style.display = 'block';
                // remove shimmer? keep it.
              }
            };

            card.appendChild(img);
            card.appendChild(skeletonDiv);
            grid.appendChild(card);
          }

        } catch (error) {
          console.error('Failed to load list.json:', error);
          grid.innerHTML = `
            <div style="grid-column:1/-1; padding: 3rem 1rem; text-align: center; color: #888;">
              <p style="font-size: 1.3rem; background: #181818; padding: 1rem 2rem; border-radius: 48px; display: inline-block; border: 1px solid #2a2a2a;">
                ⚡ couldn't load list.json
              </p>
              <p style="margin-top: 0.8rem; font-size: 0.9rem; opacity: 0.6;">check console for details</p>
            </div>
          `;
        }
      }

      // ----- start -----
      document.addEventListener('DOMContentLoaded', loadAndRender);
    })();
  </script>

  <!-- all images are in /images/ and list.json in root -->
  <!-- emojis removed, skeleton loading added -->
</body>
</html>
