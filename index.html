<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>shuffle · cards</title>
  <style>
    /* reset & base – full black */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #eee;
      padding: 0 1rem 1.5rem;
    }

    /* nav bar – minimal, black, only text */
    .nav-bar {
      width: 100%;
      padding: 1rem 0.5rem 0.75rem;
      background: transparent;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 1.5rem;
    }

    .nav-bar span {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #f0f0f0;
      background: #1a1a1a;
      padding: 0.2rem 1.2rem 0.3rem;
      border-radius: 40px;
      border: 1px solid #2a2a2a;
    }

    /* main grid — responsive, cards 5:4 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.2rem;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.2rem 0 1rem;
    }

    /* card – 5:4 ratio, flat & light */
    .card {
      background: #131313;
      border-radius: 12px;
      aspect-ratio: 5 / 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      width: 100%;
      position: relative;
      overflow: hidden;
      border: 1px solid #222;
    }

    .card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      background: #0f0f0f;
      transition: opacity 0.3s ease;
    }

    /* ----- SKELETON LOADING (light) ----- */
    .skeleton {
      background: #181818;
      border-radius: 12px;
      aspect-ratio: 5 / 4;
      width: 100%;
      border: 1px solid #222;
      position: relative;
      overflow: hidden;
      padding: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .skeleton::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 300%;
      height: 100%;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(60, 60, 60, 0.1) 30%, 
        rgba(80, 80, 80, 0.15) 50%, 
        rgba(60, 60, 60, 0.1) 70%, 
        transparent 100%);
      animation: skeleton-shimmer 1.8s infinite;
      border-radius: 12px;
    }

    @keyframes skeleton-shimmer {
      0% { transform: translateX(-30%); }
      100% { transform: translateX(30%); }
    }

    .skeleton-inner {
      width: 100%;
      height: 100%;
      background: #181818;
      border-radius: 8px;
    }

    /* skeleton placeholder inside card */
    .skeleton-placeholder {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      right: 0.5rem;
      bottom: 0.5rem;
      border-radius: 8px;
      background: #181818;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s;
      border: 1px solid #222;
    }

    .card img.loaded ~ .skeleton-placeholder {
      opacity: 0;
      pointer-events: none;
    }

    .card img[style*="display: none"] ~ .skeleton-placeholder {
      opacity: 1;
      background: #181818;
    }

    .card img.loaded + .skeleton-placeholder {
      display: none;
    }

    /* ----- LOAD MORE BUTTON (light) ----- */
    .load-more-wrapper {
      display: flex;
      justify-content: center;
      margin: 2rem 0 1rem;
      width: 100%;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }

    .load-more-btn {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 0.7rem 2.5rem;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .load-more-btn:hover {
      background: #252525;
      border-color: #4a4a4a;
    }

    .load-more-btn:active {
      transform: scale(0.96);
    }

    .load-more-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ----- MOBILE: EXACTLY 2 CARDS PER ROW ----- */
    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 0.9rem;
      }
      .nav-bar span {
        font-size: 1.4rem;
        padding: 0.15rem 1rem;
      }
      .card, .skeleton {
        border-radius: 8px;
      }
      .skeleton::before {
        border-radius: 8px;
      }
      .load-more-btn {
        padding: 0.6rem 1.8rem;
        font-size: 0.95rem;
      }
    }

    @media (min-width: 1000px) {
      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
        gap: 1.6rem;
      }
    }

    .card:active {
      transform: scale(0.98);
    }

    ::-webkit-scrollbar {
      width: 8px;
      background: #121212;
    }
    ::-webkit-scrollbar-thumb {
      background: #2f2f2f;
      border-radius: 12px;
    }

    /* Social bar ad container - minimal */
    .social-bar-container {
      width: 100%;
      max-width: 1280px;
      margin: 1.5rem auto 0.5rem;
      padding: 0.2rem 0;
      text-align: center;
    }
    
    .social-bar-container > div {
      display: inline-block;
      width: 100%;
      max-width: 728px;
      min-height: 60px;
      background: #131313;
      border-radius: 8px;
      border: 1px solid #222;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <span>videos</span>
  </nav>

  <div class="card-grid" id="cardGrid"></div>

  <!-- LOAD MORE BUTTON -->
  <div class="load-more-wrapper" id="loadMoreWrapper">
    <button class="load-more-btn" id="loadMoreBtn">Load More</button>
  </div>

  <!-- SOCIAL BAR AD CONTAINER -->
  <div class="social-bar-container" id="socialBarContainer">
    <div id="socialAdWrapper">
      <!-- The ad script will inject content here -->
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ----- configuration -----
      const JSON_PATH = 'list.json';
      const IMAGE_FOLDER = 'images/';
      const CARDS_PER_BATCH = 10;

      // ----- state -----
      let allFiles = [];          // shuffled filenames
      let currentIndex = 0;       // next index to load
      let isLoading = false;      // prevent double-trigger
      let allLoaded = false;

      // ----- shuffle function -----
      function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // ----- render a batch of cards (from currentIndex, up to CARDS_PER_BATCH) -----
      function renderNextBatch() {
        const grid = document.getElementById('cardGrid');
        if (!grid) return;

        if (allLoaded || currentIndex >= allFiles.length) {
          const btn = document.getElementById('loadMoreBtn');
          if (btn) {
            btn.disabled = true;
            btn.textContent = 'All loaded';
          }
          return;
        }

        const end = Math.min(currentIndex + CARDS_PER_BATCH, allFiles.length);
        const batch = allFiles.slice(currentIndex, end);
        currentIndex = end;

        if (currentIndex >= allFiles.length) {
          allLoaded = true;
          const btn = document.getElementById('loadMoreBtn');
          if (btn) {
            btn.disabled = true;
            btn.textContent = 'All loaded';
          }
        }

        const fragment = document.createDocumentFragment();
        for (let i = 0; i < batch.length; i++) {
          const filename = batch[i].trim();
          const imagePath = IMAGE_FOLDER + filename;

          const card = document.createElement('div');
          card.className = 'card';

          const img = document.createElement('img');
          img.src = imagePath;
          img.alt = filename;
          img.loading = 'lazy';
          img.style.opacity = '0';

          // skeleton placeholder
          const skeletonDiv = document.createElement('div');
          skeletonDiv.className = 'skeleton-placeholder';
          skeletonDiv.style.position = 'absolute';
          skeletonDiv.style.top = '0.5rem';
          skeletonDiv.style.left = '0.5rem';
          skeletonDiv.style.right = '0.5rem';
          skeletonDiv.style.bottom = '0.5rem';
          skeletonDiv.style.borderRadius = '8px';
          skeletonDiv.style.background = '#181818';
          skeletonDiv.style.pointerEvents = 'none';
          skeletonDiv.style.zIndex = '1';
          skeletonDiv.style.transition = 'opacity 0.4s';
          skeletonDiv.style.border = '1px solid #222';

          const shimmer = document.createElement('div');
          shimmer.style.position = 'absolute';
          shimmer.style.top = '0';
          shimmer.style.left = '-100%';
          shimmer.style.width = '300%';
          shimmer.style.height = '100%';
          shimmer.style.background = 'linear-gradient(90deg, transparent 0%, rgba(60,60,60,0.1) 30%, rgba(80,80,80,0.15) 50%, rgba(60,60,60,0.1) 70%, transparent 100%)';
          shimmer.style.animation = 'skeleton-shimmer 1.8s infinite';
          shimmer.style.borderRadius = '8px';
          skeletonDiv.appendChild(shimmer);

          img.onload = function() {
            this.style.opacity = '1';
            this.classList.add('loaded');
            const skel = this.nextElementSibling;
            if (skel && skel.classList.contains('skeleton-placeholder')) {
              skel.style.opacity = '0';
              setTimeout(() => {
                skel.style.display = 'none';
              }, 400);
            }
          };

          img.onerror = function() {
            this.style.display = 'none';
            const skel = this.nextElementSibling;
            if (skel && skel.classList.contains('skeleton-placeholder')) {
              skel.style.opacity = '1';
              skel.style.display = 'block';
            }
          };

          card.appendChild(img);
          card.appendChild(skeletonDiv);
          fragment.appendChild(card);
        }

        grid.appendChild(fragment);
      }

      // ----- load JSON and initialize -----
      async function init() {
        const grid = document.getElementById('cardGrid');
        const btn = document.getElementById('loadMoreBtn');
        if (!grid || !btn) return;

        try {
          const response = await fetch(JSON_PATH);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status} – ${response.statusText}`);
          }
          const data = await response.json();
          const entries = Object.values(data);
          if (!entries || entries.length === 0) {
            grid.innerHTML = `<p style="color: #666; padding: 2rem;">no images found</p>`;
            btn.style.display = 'none';
            return;
          }

          allFiles = shuffleArray([...entries]);
          currentIndex = 0;
          allLoaded = false;

          grid.innerHTML = '';
          btn.disabled = false;
          btn.textContent = 'Load More';

          renderNextBatch();

        } catch (error) {
          console.error('Failed to load list.json:', error);
          grid.innerHTML = `
            <div style="grid-column:1/-1; padding: 3rem 1rem; text-align: center; color: #888;">
              <p style="font-size: 1.3rem; background: #181818; padding: 1rem 2rem; border-radius: 40px; display: inline-block; border: 1px solid #222;">
                ⚡ couldn't load list.json
              </p>
              <p style="margin-top: 0.8rem; font-size: 0.9rem; opacity: 0.6;">check console for details</p>
            </div>
          `;
          btn.style.display = 'none';
        }
      }

      // ----- SOCIAL BAR AD REFRESH (every 10 seconds) -----
      function refreshSocialAd() {
        const wrapper = document.getElementById('socialAdWrapper');
        if (!wrapper) return;

        const oldScripts = wrapper.getElementsByTagName('script');
        while (oldScripts.length > 0) {
          oldScripts[0].parentNode.removeChild(oldScripts[0]);
        }

        wrapper.innerHTML = '';

        const script = document.createElement('script');
        script.src = 'https://pl30321615.effectivecpmnetwork.com/6f/33/fe/6f33fea7342f92e3403a5562666d5220.js';
        script.async = true;
        script.type = 'text/javascript';
        wrapper.appendChild(script);
      }

      // ----- start -----
      document.addEventListener('DOMContentLoaded', function() {
        init();

        const btn = document.getElementById('loadMoreBtn');
        if (btn) {
          btn.addEventListener('click', function() {
            if (isLoading) return;
            isLoading = true;
            renderNextBatch();
            isLoading = false;
          });
        }

        refreshSocialAd();
        setInterval(refreshSocialAd, 10000);
      });
    })();
  </script>

</body>
</html>
